# FoundationOS operator shortcuts

unbind = SUPER ALT, SPACE
bindd = SUPER ALT, SPACE, FoundationOS menu, exec, foundationos-menu
bindd = SUPER SHIFT ALT, P, Foundation Pulse, exec, foundationos-launch-foundation pulse
bindd = SUPER SHIFT ALT, C, Foundation Chat, exec, foundationos-launch-chat
bindd = SUPER SHIFT ALT, A, Foundation Approvals, exec, foundationos-approvals
bindd = SUPER SHIFT ALT, F, Foundation Launcher, exec, foundationos-launcher
